name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Quick validation - fails fast on basic issues
  validate:
    name: Quick Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
    
    - name: Set up Python
      run: uv python install 3.11
    
    - name: Install dependencies
      run: uv sync --dev
    
    - name: Check formatting
      run: |
        echo "🎨 Checking code formatting..."
        uv run ruff format --check .
    
    - name: Lint code
      run: |
        echo "🔍 Linting code..."
        uv run ruff check .
    
    - name: Check for secrets
      run: |
        echo "🔐 Checking for hardcoded secrets..."
        # Basic check for common secret patterns
        ! grep -r "TELEGRAM_TOKEN\s*=\s*['\"].*['\"]" --include="*.py" src/ || exit 1
        ! grep -r "API_KEY\s*=\s*['\"].*['\"]" --include="*.py" src/ || exit 1
    


  # Main test suite
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        uv sync --all-extras --dev
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: Run type checking
      run: |
        echo "📝 Type checking..."
        uv run mypy src --ignore-missing-imports || true  # Warning only for now
    
    - name: Run tests
      run: |
        echo "🧪 Running tests..."
        uv run pytest tests/ -v \
          --cov=src \
          --cov-report=term-missing \
          --cov-fail-under=60  # Minimum 60% coverage
      env:
        WHISPER_MODEL: tiny
    
    - name: Check test coverage
      if: matrix.python-version == '3.11'
      run: |
        echo "📊 Coverage report:"
        uv run coverage report

  # Security checks
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
    
    - name: Install dependencies
      run: uv sync --dev
    
    - name: Run security scan
      run: |
        echo "🛡️ Security scanning..."
        uv run bandit -r src -ll -f json -o bandit-report.json
        uv run bandit -r src -ll  # Show results in console
    
    - name: Check dependencies
      run: |
        echo "📦 Checking dependencies for vulnerabilities..."
        uv run pip-audit || true  # Warning only
    
    - name: Upload security report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-report
        path: bandit-report.json

  # Final status check
  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [validate, test, security]
    if: always()
    
    steps:
    - name: Check status
      run: |
        if [[ "${{ needs.validate.result }}" == "failure" || \
              "${{ needs.test.result }}" == "failure" || \
              "${{ needs.security.result }}" == "failure" ]]; then
          echo "❌ CI failed!"
          echo ""
          echo "Results:"
          echo "  Validation: ${{ needs.validate.result }}"
          echo "  Tests: ${{ needs.test.result }}"
          echo "  Security: ${{ needs.security.result }}"
          exit 1
        else
          echo "✅ All CI checks passed!"
          echo ""
          echo "Results:"
          echo "  Validation: ${{ needs.validate.result }}"
          echo "  Tests: ${{ needs.test.result }}"
          echo "  Security: ${{ needs.security.result }}"
        fi