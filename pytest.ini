[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (use real services, no external dependencies)
    slow: Slow tests (may take several seconds)
    transcription: Tests that use real Whisper models
    performance: Performance benchmarking tests
    e2e: End-to-end workflow tests
    
# Test collection patterns
norecursedirs = .git .tox dist build *.egg
minversion = 6.0

# Coverage settings (when using --cov)
# These are applied when running: pytest --cov=src
# Run: uv run pytest --cov=src --cov-report=html
addopts_coverage = 
    --cov-branch
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80